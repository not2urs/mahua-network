<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/services.css">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <div class="nav-content">
                <a href="../index.html#home">
                    <div class="logo">
                        <!-- <i class="fas fa-shopping-cart"></i> -->
                        <img src="../img/mahua--khabar logo.png" alt="B" class="logo-image">
                        <span>Mahua Khabar</span>
                    </div>
                </a>

                <button class="nav-toggle" id="navToggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </nav>

    <section class="portfolio" id="portfolio">
        <div class="gallery">
            <div class="section-header" data-aos="fade-up">

                <span class="section-tag">Our Gallery</span>
                <p class="section-description">
                    Welcome to our gallery — a space where we celebrate dynamic events, digital productions, and
                    creative milestones. Each moment is a reflection of vision, execution, and excellence.
                </p>
            </div>

             <div class="image-slider" data-aos="fade-up">
            <div class="slider-wrapper" id="sliderWrapper">

                <img src="../img/IMG_1.JPG" alt="">
                <img src="../img/IMG_2.JPG" alt="">
                <img src="../img/IMG_3.JPG" alt="">
                <img src="../img/IMG_4.JPG" alt="">

            </div>

            <button class="slider-btn prev" id="prevBtn">&#10094;</button>
            <button class="slider-btn next" id="nextBtn">&#10095;</button>
        </div>

            <!-- Popup -->
            <div class="image-popup" id="imagePopup">
                <span class="close-btn" onclick="closePopup()">×</span>
                <img id="popupImg" onclick="closePopup()">
            </div>
            <div class="portfolio-grid" id="portfolio-grid">

            

            </div>
        </div>


       
    </section>

    <script src="../js/main.js"></script>
</body>

</html>
